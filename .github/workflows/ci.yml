name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip -m pip install -e .[dev]

      - name: Lint
        run: python -m ruff check .
                
      - name: Type check
        run: python -m mypy app 

      - name: Tests
        run: python -m pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t async-llm-platfom:ci .

  security-scan:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t async-llm-platfom:scan .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: async-llm-platfom:scan
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL', 'HIGH'
          vuln-type: 'os', 'library'