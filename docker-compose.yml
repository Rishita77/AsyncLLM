version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: async-llm-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: async-llm-postgres
    environment:
      - POSTGRES_DB=async_llm
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d async_llm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: async-llm-redis
    ports:
      - "6379:6379"   
